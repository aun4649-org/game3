<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMOS II — Interactive Interpreter</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="screen-container">
        <div id="crt-overlay"></div>
        <pre id="screen"></pre>
    </div>

    <!-- Scripts loaded in dependency order:
         tokenizer → runtime (core → memory → evaluator → executor → loop)
         → terminal (screen → input → keys) → editor -->
    <script src="js/tokenizer.js?v=1"></script>
    <script src="js/runtime-core.js?v=1"></script>
    <script src="js/runtime-memory.js?v=1"></script>
    <script src="js/runtime-evaluator.js?v=1"></script>
    <script src="js/runtime-executor.js?v=1"></script>
    <script src="js/runtime-loop.js?v=1"></script>
    <script src="js/terminal-screen.js?v=1"></script>
    <script src="js/terminal-input.js?v=1"></script>
    <script src="js/terminal-keys.js?v=1"></script>
    <script src="js/editor.js?v=1"></script>
</body>

</html>
